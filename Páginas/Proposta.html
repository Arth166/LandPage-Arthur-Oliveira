<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta</title>
    <link rel="shortcut icon" href="../Imagens/Folha(favi).png" type="image/x-icon">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }


        .conteudo {
            flex: 1;
            padding: 20px;
        }

        .rodape {
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="conteudo">
        <a href="../index.html" target="_self" rel="prev"><img src="../Imagens/home.png" alt="Botão de home"
                width="90px"></a>
        <center>
            <form action="mailto:arthur.oliv@outlook.com" method="post">
                <table border="2" cellpadding="15">
                    <thead>
                        <th colspan="2">
                            <h2>Preencha o formulário</h2>
                        </th>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="2"><label for="nome-usuario">Nome:</label>
                        <input type="text" name="nome-usuario" id="id-nome" size="50" maxlength="60"
                        value="" placeholder="Digite seu nome completto" required>
                        </td>
                        </tr>
                        <tr>
                            <td colspan="2"><label for="email">Email:</label>
                                <input type="email" name="email-profissional" id="id-email" value=""
                                placeholder="Digite seu email profissional" size="50" required>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2"><label for="telefone">Telefone:</label>
                            <input type="tel" id="id-tel" name="telefone" size="10" maxlength="11"
                            value="" placeholder="Digite seu telefone com ddd">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <label for="data_nasc">Data de nascimento:</label>
                                <input type="date" name="data-nasc" id="id_datanasc" required>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="Tipo_pessoa">Pessoa Física ou Jurídica?</label> <br>
                            <input type="radio" name="opcao" id="opcao" value="Fisica" required>Física <br>
                            <input type="radio" name="opcao" id="opcao" value="Juridica" required>Jurídica
                            </td>
                            <td>
                                <label for="">Qual o melhor horário de contato?</label> <br>
                                <input type="time" name="time" id="id-time">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2"> <label for="">Qual é o tipo de serviço que desejado?</label>
                                <br>
                                <input type="checkbox" name="html-css" value="Html-Css">Páginas com HTML e CSS<br>
                                <input type="checkbox" name="html-css(din)" value="Html-Css(DIN)">Páginas com HTML e CSS(dinâmica) <br>
                                <input type="checkbox" name="html-css(din-avanc)" value="Html-Css(DIN-AVANC)">Páginas com HTML e CSS(estética dinâmica e avançada)
                                <hr>
                                <label for="">Quantidade de páginas desejado?</label>
                                <select name="Páginas" size="1" required>
                                    <option value="">Selecione</option>
                                    <option value="1-2">De 1 a 2 Páginas</option>
                                    <option value="3-5">De 3 a 5 Páginas</option>
                                    <option value="+5">Mais de 5 Páginas</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <label for="Descricao">Digite uma breve descrição do que deseja contratar:</label>
                                <br>
                                <textarea name="descricao" id="id_descricao" cols="55" rows="7" placeholder="Digite aqui."></textarea>
                                <br>
                                <label for="">Enviar Arquivo:</label>
                                <input type="file" name="arquivo" id="id-arquivo">
                            </td>
                        </tr>
                        <tr>
                            <td><input type="submit" value="Enviar"></td>
                            <td><input type="reset" value="Limpar"></td>
                        </tr>
                    </tbody>
                </table>
            </form>
        </center>
    </div>
    <div class="rodape">
        <center>
            <table border="2" cellpadding="10">
                <tbody>
                    <tr>
                        <td>
                            <p>
                                <center>Entre em contato!</center>
                                <center>Arthur Oliveira</center>
                            </p>
                            <p>Telefone:(27)99771-9893 | Email:arthur.oliv@outlook.com</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </center>
    </div>
</body>

</html>
